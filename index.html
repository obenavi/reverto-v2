<!DOCTYPE html>
<html lang="he" dir="rtl">

  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: var(--surface);
    }
    .logo-mark {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(107,53,184,0.3);
    }
    .logo-name {
      font-size: 32px;
      font-weight: 800;
      color: var(--on-surface);
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .logo-sub {
      font-size: 14px;
      color: var(--on-surface-3);
      margin-bottom: 48px;
      text-align: center;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface-card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      padding: 28px 24px;
    }
    .login-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
      color: var(--on-surface);
    }
    .login-desc {
      font-size: 13px;
      color: var(--on-surface-3);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .input-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--on-surface-2);
      margin-bottom: 6px;
      display: block;
    }
    .error-msg {
      font-size: 13px;
      color: var(--error);
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .divider {
      text-align: center;
      font-size: 12px;
      color: var(--on-surface-3);
      margin: 16px 0;
    }
    .waitlist-link {
      font-size: 13px;
      color: var(--primary);
      text-align: center;
      cursor: pointer;
      font-weight: 700;
    }
  </style>
</head>

    async function tryLogin() {
      const code = document.getElementById('access-code').value.trim();
      if (!code) return;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');
      btn.textContent = '...????';
      btn.disabled = true;
      err.style.display = 'none';
      try {
        const res = await fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},

      const phone = document.getElementById('wl-phone').value.trim();

      await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
